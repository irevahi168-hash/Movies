<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieFlix Admin - Add Movie</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #141414; }
        .glass { background: rgba(31, 31, 31, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="text-white font-sans min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full glass p-8 rounded-xl shadow-2xl border border-gray-800">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-extrabold text-red-600 tracking-tighter">ADMIN PANEL</h2>
            <p class="text-gray-400 text-xs mt-2">Add new movies to your database</p>
        </div>
        
        <div class="space-y-5">
            <div>
                <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">GitHub PAT Token</label>
                <input type="password" id="gh-token" placeholder="Paste ghp_... token here" 
                    class="w-full bg-[#2b2b2b] border border-gray-700 p-3 rounded text-white focus:ring-2 focus:ring-red-600 outline-none text-sm transition-all">
            </div>

            <div>
                <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">IMDb Movie Link</label>
                <input type="text" id="imdb-url" placeholder="https://www.imdb.com/title/tt..." 
                    class="w-full bg-[#2b2b2b] border border-gray-700 p-3 rounded text-white focus:ring-2 focus:ring-red-600 outline-none text-sm transition-all">
            </div>

            <div>
                <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Your Download Link</label>
                <input type="text" id="dl-link" placeholder="Direct or Drive link" 
                    class="w-full bg-[#2b2b2b] border border-gray-700 p-3 rounded text-white focus:ring-2 focus:ring-red-600 outline-none text-sm transition-all">
            </div>

            <button onclick="addMovie()" id="post-btn" 
                class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 rounded-lg transition duration-300 mt-2 shadow-lg hover:scale-[1.02] active:scale-[0.98]">
                POST
