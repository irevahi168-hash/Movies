<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieFlix Admin - Add Movie</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#141414] text-white font-sans min-h-screen flex items-center justify-center p-6">

    <div class="max-w-md w-full bg-[#1f1f1f] p-8 rounded-lg shadow-2xl border border-gray-800">
        <h2 class="text-3xl font-bold text-red-600 mb-6 text-center">Admin Panel</h2>
        
        <div class="space-y-4">
            <div>
                <label class="block text-sm text-gray-400 mb-1">IMDb Movie Link</label>
                <input type="text" id="imdb-url" placeholder="https://www.imdb.com/title/tt..." 
                    class="w-full bg-[#333] border-none p-3 rounded text-white focus:ring-2 focus:ring-red-600 outline-none">
            </div>

            <div>
                <label class="block text-sm text-gray-400 mb-1">Your Download Link</label>
                <input type="text" id="dl-link" placeholder="Direct Download or G-Drive Link" 
                    class="w-full bg-[#333] border-none p-3 rounded text-white focus:ring-2 focus:ring-red-600 outline-none">
            </div>

            <button onclick="addMovie()" id="post-btn" 
                class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 rounded transition duration-300 mt-4 shadow-lg">
                POST TO WEBSITE
            </button>
        </div>

        <div id="status" class="mt-6 p-3 rounded hidden text-center text-sm"></div>
        
        <div class="mt-6 text-center text-gray-500 text-xs">
            <a href="index.html" class="hover:text-white underline">← Back to Website</a>
        </div>
    </div>

    <script>
        /* --- CONFIGURATION START --- */
        const GITHUB_TOKEN = 'YOUR_GITHUB_PERSONAL_ACCESS_TOKEN'; // ghp_ diye shuru hoy
        const REPO_OWNER = 'irevahi168-hash';              // Apnar GitHub Username
        const REPO_NAME = 'Movies';             // Repository-r nam
        const OMDB_API_KEY = '1045d300';               // OMDb API key
        /* --- CONFIGURATION END --- */

        async function addMovie() {
            const btn = document.getElementById('post-btn');
            const status = document.getElementById('status');
            const imdbUrl = document.getElementById('imdb-url').value;
            const dlLink = document.getElementById('dl-link').value;

            if(!imdbUrl || !dlLink) {
                showStatus("Please fill both fields!", "bg-yellow-600");
                return;
            }

            try {
                btn.disabled = true;
                btn.innerText = "Processing...";
                showStatus("Fetching IMDb Data...", "bg-blue-600");

                // 1. Extract IMDb ID
                const imdbID = imdbUrl.match(/tt\d+/)[0];

                // 2. Fetch data from OMDb
                const omdbRes = await fetch(`https://www.omdbapi.com/?i=${imdbID}&apikey=${OMDB_API_KEY}`);
                const movie = await omdbRes.json();

                if(movie.Response === "False") throw new Error("Movie not found!");

                // 3. Get data.json from GitHub
                showStatus("Connecting to GitHub...", "bg-indigo-600");
                const fileUrl = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/data.json`;
                
                const getFile = await fetch(fileUrl, {
                    headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
                });
                
                const fileInfo = await getFile.json();
                const sha = fileInfo.sha;
                const currentContent = JSON.parse(atob(fileInfo.content));

                // 4. Create New Entry
                const newMovie = {
                    title: movie.Title,
                    poster: movie.Poster,
                    rating: movie.imdbRating,
                    download: dlLink
                };
                currentContent.push(newMovie);

                // 5. Update GitHub
                const updateRes = await fetch(fileUrl, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${GITHUB_TOKEN}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: `Added: ${movie.Title}`,
                        content: btoa(unescape(encodeURIComponent(JSON.stringify(currentContent, null, 2)))),
                        sha: sha
                    })
                });

                if(updateRes.ok) {
                    showStatus(`Success! "${movie.Title}" has been posted.`, "bg-green-600");
                    document.getElementById('imdb-url').value = "";
                    document.getElementById('dl-link').value = "";
                } else {
                    throw new Error("GitHub update failed!");
                }

            } catch (err) {
                showStatus("Error: " + err.message, "bg-red-600");
            } finally {
                btn.disabled = false;
                btn.innerText = "POST TO WEBSITE";
            }
        }

        function showStatus(msg, bgColor) {
            const status = document.getElementById('status');
            status.innerText = msg;
            status.className = `mt-6 p-3 rounded text-center text-sm block ${bgColor}`;
        }
    </script>
</body>
</html>
