<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieFlix Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#141414] text-white min-h-screen flex items-center justify-center p-6">

    <div class="max-w-md w-full bg-[#1f1f1f] p-8 rounded-lg shadow-2xl border border-gray-800">
        <h2 class="text-3xl font-bold text-red-600 mb-6 text-center">Admin Panel</h2>
        
        <div class="space-y-4">
            <div>
                <label class="block text-sm text-gray-400 mb-1">GitHub Token (Keep it Secret)</label>
                <input type="password" id="gh-token" placeholder="Paste your ghp_ token" 
                    class="w-full bg-[#333] border-none p-3 rounded text-white focus:ring-2 focus:ring-red-600 outline-none text-sm">
            </div>

            <div>
                <label class="block text-sm text-gray-400 mb-1">IMDb Link</label>
                <input type="text" id="imdb-url" placeholder="https://www.imdb.com/title/tt..." 
                    class="w-full bg-[#333] border-none p-3 rounded text-white focus:ring-2 focus:ring-red-600 outline-none text-sm">
            </div>

            <div>
                <label class="block text-sm text-gray-400 mb-1">Download Link</label>
                <input type="text" id="dl-link" placeholder="Direct Download Link" 
                    class="w-full bg-[#333] border-none p-3 rounded text-white focus:ring-2 focus:ring-red-600 outline-none text-sm">
            </div>

            <button onclick="addMovie()" id="post-btn" 
                class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 rounded transition mt-4 shadow-lg text-sm">
                POST TO WEBSITE
            </button>
        </div>

        <div id="status" class="mt-6 p-3 rounded hidden text-center text-sm"></div>
    </div>

    <script>
        const REPO_OWNER = 'irevahi168-hash';              
        const REPO_NAME = 'Movies';             
        const OMDB_API_KEY = '1045d300';               

        async function addMovie() {
            const btn = document.getElementById('post-btn');
            const token = document.getElementById('gh-token').value;
            const imdbUrl = document.getElementById('imdb-url').value;
            const dlLink = document.getElementById('dl-link').value;

            if(!token || !imdbUrl || !dlLink) {
                showStatus("Token, Link ebong Download link—shob ghor puron korun!", "bg-yellow-600");
                return;
            }

            try {
                btn.disabled = true;
                btn.innerText = "Processing...";
                showStatus("Fetching Data...", "bg-blue-600");

                const imdbMatch = imdbUrl.match(/tt\d+/);
                const imdbID = imdbMatch[0];

                const omdbRes = await fetch(`https://www.omdbapi.com/?i=${imdbID}&apikey=${OMDB_API_KEY}`);
                const movie = await omdbRes.json();

                showStatus("Syncing GitHub...", "bg-indigo-600");
                const fileUrl = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/data.json`;
                
                const getFile = await fetch(fileUrl, {
                    headers: { 'Authorization': `token ${token}`, 'Cache-Control': 'no-cache' }
                });
                
                const fileInfo = await getFile.json();
                const sha = fileInfo.sha;
                const currentContent = JSON.parse(atob(fileInfo.content));

                const newData = { title: movie.Title, poster: movie.Poster, rating: movie.imdbRating, download: dlLink };
                currentContent.push(newData);

                const updateRes = await fetch(fileUrl, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: `Added: ${movie.Title}`,
                        content: btoa(unescape(encodeURIComponent(JSON.stringify(currentContent, null, 2)))),
                        sha: sha
                    })
                });

                if(updateRes.ok) {
                    showStatus(`Success! "${movie.Title}" posted.`, "bg-green-600");
                } else {
                    throw new Error("GitHub Update Failed. Check Token!");
                }

            } catch (err) {
                showStatus("Error: " + err.message, "bg-red-600");
            } finally {
                btn.disabled = false;
                btn.innerText = "POST TO WEBSITE";
            }
        }

        function showStatus(msg, bgColor) {
            const status = document.getElementById('status');
            status.innerText = msg;
            status.className = `mt-6 p-3 rounded text-center text-sm block ${bgColor}`;
        }
    </script>
</body>
</html>
