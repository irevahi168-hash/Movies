<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieFlix - Watch Latest Movies</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #141414; color: white; scroll-behavior: smooth; }
        .movie-card:hover img { transform: scale(1.05); transition: 0.3s; }
        .hero-gradient { background: linear-gradient(to bottom, rgba(20,20,20,0) 0%, rgba(20,20,20,1) 100%); }
    </style>
</head>
<body class="font-sans">

    <nav class="p-6 flex justify-between items-center fixed w-full z-50 bg-gradient-to-b from-black to-transparent">
        <h1 class="text-3xl font-extrabold text-red-600 tracking-tighter">MOVIEFLIX</h1>
        <a href="admin.html" class="bg-red-600 px-4 py-1.5 rounded-sm text-sm font-bold hover:bg-red-700 transition">Admin</a>
    </nav>

    <header class="relative h-[70vh] w-full flex items-end p-8 md:p-16">
        <div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1626814026160-2237a95fc5a0?q=80&w=2070')] bg-cover bg-center">
            <div class="absolute inset-0 bg-black/40"></div>
            <div class="absolute inset-0 hero-gradient"></div>
        </div>
        
        <div class="relative z-10 max-w-2xl">
            <h2 class="text-5xl md:text-6xl font-black mb-4 uppercase">Infinite Cinema</h2>
            <p class="text-gray-300 text-lg mb-6">Explore the latest movies and series. All your favorites in one place, high quality and direct downloads.</p>
            <div class="flex gap-4">
                <button class="bg-white text-black px-8 py-2 rounded font-bold flex items-center gap-2 hover:bg-gray-200">
                    <i class="fa-solid fa-play"></i> Play
                </button>
                <button class="bg-gray-500/50 text-white px-8 py-2 rounded font-bold backdrop-blur-md hover:bg-gray-500/70">
                    <i class="fa-solid fa-circle-info"></i> More Info
                </button>
            </div>
        </div>
    </header>

    <main class="p-8 md:p-16 -mt-20 relative z-20">
        <h3 class="text-xl font-semibold mb-6 text-gray-400 uppercase tracking-widest">Popular on MovieFlix</h3>
        
        <div id="movie-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-6">
            <div class="animate-pulse bg-gray-800 h-72 rounded-lg"></div>
            <div class="animate-pulse bg-gray-800 h-72 rounded-lg"></div>
            <div class="animate-pulse bg-gray-800 h-72 rounded-lg"></div>
        </div>
    </main>

    <footer class="p-16 text-center text-gray-600 text-sm border-t border-gray-800 mt-10">
        <p>&copy; 2026 MovieFlix - Dev Kabir. All Rights Reserved.</p>
    </footer>

    <script>
        async function loadMovies() {
            const grid = document.getElementById('movie-grid');
            
            try {
                // cache: 'no-store' helps to bypass GitHub Pages cache
                const response = await fetch('data.json?v=' + new Date().getTime(), {
                    cache: 'no-store'
                });
                
                const movies = await response.json();
                grid.innerHTML = ''; // Clear loading state

                if(movies.length === 0) {
                    grid.innerHTML = '<p class="col-span-full text-center text-gray-500 py-20 text-lg italic">No movies added yet. Go to Admin to add some!</p>';
                    return;
                }

                movies.reverse().forEach(movie => { // Latest movie first
                    const card = `
                        <div class="movie-card group cursor-pointer relative">
                            <div class="overflow-hidden rounded-lg shadow-lg aspect-[2/3] bg-gray-900">
                                <img src="${movie.poster}" alt="${movie.title}" class="w-full h-full object-cover transition duration-300">
                            </div>
                            <div class="mt-3">
                                <h4 class="font-bold text-sm truncate">${movie.title}</h4>
                                <div class="flex items-center justify-between mt-1 text-xs text-gray-400">
                                    <span class="flex items-center gap-1 text-yellow-500">
                                        <i class="fa-solid fa-star"></i> ${movie.rating}
                                    </span>
                                    <a href="${movie.download}" target="_blank" class="bg-red-600/10 text-red-500 px-2 py-0.5 rounded border border-red-500/20 hover:bg-red-600 hover:text-white transition">Download</a>
                                </div>
                            </div>
                        </div>
                    `;
                    grid.innerHTML += card;
                });

            } catch (error) {
                console.error("Error loading movies:", error);
                grid.innerHTML = '<p class="text-red-500 col-span-full text-center">Failed to load movies. Please check data.json file.</p>';
            }
        }

        // Initialize
        loadMovies();
    </script>
</body>
</html>
