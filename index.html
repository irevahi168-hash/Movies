<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieFlix - World of Cinema</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #141414; color: white; }
        .movie-card:hover .poster-img { transform: scale(1.08); }
        .hero-gradient { background: linear-gradient(to bottom, rgba(20,20,20,0) 0%, rgba(20,20,20,1) 100%); }
    </style>
</head>
<body class="font-sans">

    <nav class="p-5 flex justify-between items-center fixed w-full z-50 bg-gradient-to-b from-black to-transparent">
        <h1 class="text-3xl font-black text-red-600 tracking-tighter italic">MOVIEFLIX</h1>
        <div class="flex gap-4 items-center">
            <a href="admin.html" class="bg-red-600 px-4 py-1 rounded text-xs font-bold uppercase hover:bg-red-700 transition">Admin</a>
        </div>
    </nav>

    <header class="relative h-[65vh] w-full flex items-end p-8 md:p-16">
        <div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1536440136628-849c177e76a1?q=80&w=1925')] bg-cover bg-center">
            <div class="absolute inset-0 bg-black/50"></div>
            <div class="absolute inset-0 hero-gradient"></div>
        </div>
        
        <div class="relative z-10 max-w-3xl">
            <h2 class="text-5xl md:text-7xl font-black mb-4 uppercase leading-none">Unlimited <br><span class="text-red-600">Entertainment</span></h2>
            <p class="text-gray-300 text-lg mb-6 max-w-lg">Watch and download your favorite movies in HD quality. Always updated with the latest releases.</p>
            <div class="flex gap-4">
                <button class="bg-white text-black px-10 py-2.5 rounded font-bold flex items-center gap-2 hover:bg-gray-200 transition">
                    <i class="fa-solid fa-play"></i> Watch Now
                </button>
            </div>
        </div>
    </header>

    <main class="p-8 md:p-16 -mt-10 relative z-20">
        <h3 class="text-xl font-bold mb-8 text-white border-l-4 border-red-600 pl-3 uppercase tracking-wider">Trending Now</h3>
        
        <div id="movie-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-6">
            <div class="animate-pulse bg-gray-800 h-64 rounded-xl"></div>
            <div class="animate-pulse bg-gray-800 h-64 rounded-xl"></div>
            <div class="animate-pulse bg-gray-800 h-64 rounded-xl"></div>
            <div class="animate-pulse bg-gray-800 h-64 rounded-xl"></div>
        </div>
    </main>

    <footer class="p-10 text-center text-gray-600 text-sm border-t border-gray-900 mt-20">
        <p class="mb-2 italic text-gray-400">Developed with ❤️ by Kabir</p>
        <p>&copy; 2026 MovieFlix - All Rights Reserved</p>
    </footer>

    <script>
        async function fetchMovies() {
            const grid = document.getElementById('movie-grid');
            
            try {
                // Using timestamp to avoid cache issues
                const response = await fetch('data.json?t=' + Date.now());
                const movies = await response.json();
                
                grid.innerHTML = ''; 

                if(!movies || movies.length === 0) {
                    grid.innerHTML = '<p class="col-span-full text-center text-gray-500 py-10">No movies found in database.</p>';
                    return;
                }

                // Reverse loop so newest movies appear first
                movies.reverse().forEach((movie, index) => {
                    // Correct index calculation because of reverse()
                    const originalIndex = movies.length - 1 - index;
                    
                    const card = `
                        <a href="details.html?id=${originalIndex}" class="movie-card group block relative">
                            <div class="relative overflow-hidden rounded-xl shadow-2xl bg-gray-900 aspect-[2/3] border border-gray-800 group-hover:border-red-600 transition duration-300">
                                <img src="${movie.poster}" alt="${movie.title}" class="poster-img w-full h-full object-cover transition duration-500">
                                
                                <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent opacity-0 group-hover:opacity-100 transition duration-300 flex flex-col justify-end p-4">
                                    <span class="bg-red-600 text-white text-[10px] font-bold px-2 py-1 rounded w-fit mb-2">DETAILS</span>
                                </div>
                            </div>
                            <div class="mt-3">
                                <h4 class="font-bold text-sm truncate group-hover:text-red-500 transition">${movie.title}</h4>
                                <div class="flex items-center gap-2 mt-1">
                                    <span class="text-yellow-500 text-xs"><i class="fa-solid fa-star"></i> ${movie.rating}</span>
                                    <span class="text-[10px] text-gray-500 border border-gray-700 px-1 rounded uppercase">HD</span>
                                </div>
                            </div>
                        </a>
                    `;
                    grid.innerHTML += card;
                });

            } catch (err) {
                console.error("Error:", err);
                grid.innerHTML = '<p class="text-red-500 text-center col-span-full font-bold">Error loading database. Please check data.json!</p>';
            }
        }

        window.onload = fetchMovies;
    </script>
</body>
</html>
