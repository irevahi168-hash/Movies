<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieFlix - Responsive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .hero-bg {
            background: linear-gradient(to bottom, rgba(0,0,0,0.2) 0%, rgba(20,20,20,1) 100%), 
                        url('https://images.unsplash.com/photo-1626814026160-2237a95fc5a0?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
        }
        
        .movie-card { transition: transform 0.3s ease; flex-shrink: 0; }
        @media (min-width: 1024px) {
            .movie-card:hover { transform: scale(1.1); z-index: 10; }
        }
    </style>
</head>
<body class="bg-[#141414] text-white font-sans overflow-x-hidden">

    <header class="fixed top-0 w-full px-4 md:px-10 py-4 z-50 flex items-center justify-between bg-gradient-to-b from-black/80 to-transparent">
        <div class="flex items-center">
            <h1 class="text-2xl md:text-3xl font-bold text-red-600 tracking-tighter">MOVIEFLIX</h1>
            <nav class="hidden md:flex ml-10 space-x-5 text-sm">
                <a href="#" class="font-semibold">Home</a>
                <a href="#" class="text-gray-300 hover:text-white">Movies</a>
                <a href="#" class="text-gray-300 hover:text-white">New & Popular</a>
            </nav>
        </div>
        <div class="text-sm">
            <button class="bg-red-600 px-4 py-1 rounded text-xs md:text-sm font-bold">Admin</button>
        </div>
    </header>

    <section class="h-[70vh] md:h-[85vh] hero-bg flex items-end pb-12 md:pb-24 px-6 md:px-10">
        <div class="max-w-2xl">
            <h2 class="text-4xl md:text-7xl font-extrabold mb-4 leading-tight">Infinite Cinema</h2>
            <p class="text-sm md:text-lg text-gray-200 mb-6 line-clamp-3 md:line-clamp-none">
                Watch the latest blockbusters and exclusive shows. Download directly to your device and enjoy offline anywhere.
            </p>
            <div class="flex space-x-3">
                <button class="bg-white text-black px-6 md:px-10 py-2 rounded font-bold hover:bg-white/90 shadow-lg">▶ Play</button>
                <button class="bg-gray-500/60 text-white px-6 md:px-10 py-2 rounded font-bold backdrop-blur-md">ⓘ Info</button>
            </div>
        </div>
    </section>

    <main class="pl-6 md:pl-10 -mt-10 md:-mt-20 relative z-20 space-y-8 md:space-y-12">
        
        <div>
            <h3 class="text-lg md:text-2xl font-semibold mb-3">Trending Now</h3>
            <div id="trending-row" class="flex space-x-2 md:space-x-4 overflow-x-scroll no-scrollbar pr-10 py-4">
                </div>
        </div>

        <div class="pb-10">
            <h3 class="text-lg md:text-2xl font-semibold mb-3">Popular on MovieFlix</h3>
            <div id="popular-row" class="flex space-x-2 md:space-x-4 overflow-x-scroll no-scrollbar pr-10 py-4">
                </div>
        </div>
    </main>

    <script>
        fetch('data.json')
            .then(res => res.json())
            .then(data => {
                const trendingRow = document.getElementById('trending-row');
                const popularRow = document.getElementById('popular-row');
                
                data.forEach(movie => {
                    const cardHTML = `
                        <div class="movie-card relative w-[130px] h-[190px] md:w-[210px] md:h-[310px] rounded-md overflow-hidden bg-gray-800">
                            <img src="${movie.poster}" class="w-full h-full object-cover" loading="lazy">
                            <div class="absolute inset-0 bg-black/60 opacity-0 md:hover:opacity-100 flex flex-col justify-end p-3 transition-opacity">
                                <h4 class="font-bold text-xs md:text-sm truncate">${movie.title}</h4>
                                <div class="flex items-center justify-between mt-2">
                                    <span class="text-yellow-400 text-[10px] md:text-xs">★ ${movie.rating}</span>
                                    <a href="${movie.download}" class="bg-red-600 px-2 py-1 rounded text-[10px] font-bold">GET</a>
                                </div>
                            </div>
                            <a href="${movie.download}" class="absolute inset-0 md:hidden"></a>
                        </div>
                    `;
                    trendingRow.innerHTML += cardHTML;
                    popularRow.innerHTML += cardHTML;
                });
            });
    </script>
</body>
</html>
